---

networks:
  ocean:
    external: true
  lagoon:
    external: true

volumes:
  jellyfin_ts:
  seerr_ts:

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    env_file: ../tskey.env
    group_add: 
      - "105" # render
    environment:
      - PUID=984 # homemedia
      - PGID=100 # users
      - TZ=America/Montreal
      - JELLYFIN_PublishedServerUrl=jellyfin.sole-altair.ts.net #optional
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DOCKER_MODS=ghcr.io/tailscale-dev/docker-mod:main
      - TAILSCALE_STATE_DIR=/var/lib/tailscale
      - TAILSCALE_SERVE_MODE=http
      - TAILSCALE_SERVE_PORT=80
      - TAILSCALE_HOSTNAME=jellyfin
    volumes:
      - jellyfin_ts:/var/lib/tailscale
      - /srv/jellyfin:/config
      - /l/backup/sklad/jellyfin:/config/data/data/backups
      - /l/video/documentaries:/data/documentaries:ro
      - /l/video/miniseries:/data/miniseries:ro
      - /l/video/tvshows:/data/tvshows:ro
      - /l/video/tvshows-michelle:/data/tvshows-michelle:ro
      - /l/video/movies:/data/movies:ro
      - /l/video/movies-michelle:/data/movies-michelle:ro
      - /l/video/mma:/data/mma:ro
      - /l/audio/files:/data/audio:ro
      - /l/audio/podcasts:/data/podcasts:ro
    networks:
      lagoon:
        aliases: [jlfn]
      ocean:
        ipv4_address: 192.168.2.215
    dns:
      - 1.1.1.1
      - 8.8.8.8
    devices:
      - /dev/dri:/dev/dri
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    deploy:   # this section is for NVIDIA support in newer docker-compose
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    labels:
      - falarie.groupby=media

  seerr_ts:
    image: tailscale/tailscale
    container_name: seerr_ts
    depends_on: [jellyfin]
    cap_add:
      - net_admin
      - sys_module
    env_file: ../tskey.env
    environment:
      - TZ=America/Montreal
      - TS_HOSTNAME=seerr
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - seerr_ts:/var/lib/tailscale
      - ./seer_ts:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      lagoon:
        aliases: [sr]
    restart: unless-stopped
    labels:
      - falarie.groupby=media

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    depends_on: [seerr_ts]
    container_name: seerr
    user: "1000:100"
    environment:
      - LOG_LEVEL=info
      - TZ=America/Montreal
      - PORT=80 #optional
    volumes:
      - /srv/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    network_mode: service:seerr_ts
    restart: unless-stopped
    labels:
      - falarie.groupby=media
