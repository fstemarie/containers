---

networks:
  ocean:
    external: true
  lagoon:
    external: true

volumes:
  jellyfin_ts:
  seerr_ts:

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    group_add: 
      - "105" # render
    env_file: ../tskey.env
    environment:
      - PUID=999 # jellyfin
      - PGID=984 # homemedia
      - TZ=America/Toronto
      - JELLYFIN_PublishedServerUrl=https://jellyfin.sole-altair.ts.net #optional
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DOCKER_MODS=ghcr.io/tailscale-dev/docker-mod:main
      - TAILSCALE_STATE_DIR=/var/lib/tailscale
      - TAILSCALE_SERVE_MODE=https
      - TAILSCALE_SERVE_PORT=80
      - TAILSCALE_HOSTNAME=jellyfin
    volumes:
      - jellyfin_ts:/var/lib/tailscale
      # - ./jellyfin/resolv.conf:/etc/resolv.conf
      - /srv/jellyfin/config:/config
      - /l/backup/sklad/jellyfin:/config/data/data/backups
      - /l/video/documentaries:/data/documentaries
      - /l/video/miniseries:/data/miniseries
      - /l/video/tvshows:/data/tvshows
      - /l/video/tvshows-michelle:/data/tvshows-michelle
      - /l/video/movies:/data/movies
      - /l/video/movies-michelle:/data/movies-michelle
      - /l/video/mma:/data/mma
      - /l/audio/files:/data/audio
      - /l/audio/podcasts:/data/podcasts
    devices:
      - /dev/dri:/dev/dri
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-uvm:/dev/nvidia-uvm
    networks:
      lagoon:
        aliases: ["jlfn"]
      ocean:
        ipv4_address: 10.0.2.220
    # ports:
    #   - "7359:7359/udp"
    #   - "1900:1900/udp"
    deploy:   # this section is for NVIDIA support in newer docker-compose
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    labels:
      - falarie.groupby=media

  seerr_ts:
    image: tailscale/tailscale:latest
    container_name: seerr_ts
    depends_on: [jellyfin]
    cap_add:
      - net_admin
      - sys_module
    env_file: ../tskey.env
    environment:
      - TZ=America/Montreal
      - TS_HOSTNAME=seerr
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - seerr_ts:/var/lib/tailscale
      - ./seerr_ts:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      lagoon:
        aliases: [sr]
    restart: unless-stopped
    labels:
      - falarie.groupby=media

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    depends_on: [seerr_ts]
    container_name: seerr
    user: "1000:100"
    environment:
      - LOG_LEVEL=info
      - TZ=America/Montreal
      - PORT=80 #optional
    volumes:
      - /srv/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost/api/v1/settings/public || exit 1
      start_period: 60s
      timeout: 10s
      retries: 3
      interval: 60s
    network_mode: service:seerr_ts
    restart: unless-stopped
    labels:
      - falarie.groupby=media
